<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Email Domain Analysis</title>
  <link rel="stylesheet" href="styles/style.css">
</head>

<body>

  <h1 id="findOut">Find Out How Secure An Email Domain Is</h1>

  <h2 id="analysisDetails">Analysis Details (DMARC, SPF Record List, chances of brand impersonation)</h2>

  <div id="domainForm">
    <form>
      <label for="domainSubmitted" id="formLabel">Enter Domain Name:</label>
      <input type="text" id="domainSubmitted" name="domainSubmitted" placeholder="example.com">
      <button type="submit" id="getResults">Search</button>
    </form>
  </div>

  <div id="results">
  <h2 id="h2results">Results</h2>

  <div id="mainRow">
    <!-- Overall Results -->
    <div class="result-block">
      <div id="overallResults">
        <!-- Add chart or content here -->
      </div>
      <h3 id="h3overall">Overall Results</h3>
    </div>

    <!-- Ratings side by side -->
    <div id="ratingContainer">
      <div class="rating-block">
        <div id="dmarc">
          <!-- DMARC chart -->
        </div>
        <h3 id="h3dmarc">DMARC</h3>
      </div>
      <div class="rating-block">
        <div id="spf">
          <!-- SPF chart -->
        </div>
        <h3 id="h3spf">SPF</h3>
      </div>
      <div class="rating-block">
        <div id="brand">
          <!-- Brand chart -->
        </div>
        <h3 id="h3brand">Brand</h3>
      </div>
    </div>
  </div>
</div>

</body>

</html>
